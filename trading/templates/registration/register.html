{% extends 'trading/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-primary mb-4">Регистрация</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                </form>
                <hr>
                <p class="text-center">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
